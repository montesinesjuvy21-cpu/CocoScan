<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocoScan - Coconut Pest Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* The Makeover Palette */
            --bg-dark-green: #081C10;   /* Deeper, more luxurious backdrop */
            --primary-green: #2A7B4C;   /* Vibrant leaf for accents & logo */
            --primary-hover: #113228;   /* Dark emerald for button hover states */
            --button-base: #1B4D3E;     /* Confident action color */
            --accent-light: #F4F7F5;    /* Sage tint for inputs instead of flat white */
            
            /* Typography & Borders */
            --text-dark: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --radius-main: 20px;        /* Slightly rounder corners for a friendlier feel */
            --radius-input: 10px;       /* Sleeker input tracking */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark-green);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        /* Modernized Elegant Glass/Card Layout */
        .auth-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 2rem;
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-md);
            animation: fadeIn 0.4s ease-out;
        }

        .auth-card.wide-card {
            max-width: 520px;
        }

        /* SVG Vector Logo Styling */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo-icon-wrap {
            color: var(--primary-green);
            font-size: 3rem;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .logo-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-green);
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-row {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.input-icon-left {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-wrapper i.toggle-password {
            position: absolute;
            right: 12px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 0.85rem;
            font-size: 0.95rem;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-input);
            background-color: #f9fafb;
            color: var(--text-dark);
            transition: all 0.2s ease;
            outline: none;
        }

        .has-icon-left input {
            padding-left: 2.3rem;
        }

        input:focus, select:focus {
            background-color: #fff;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.15);
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary-green);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-input);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-primary:active {
            transform: scale(0.99);
        }

        /* Footer Utilities */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: -0.75rem;
            margin-bottom: 1.25rem;
        }

        .forgot-password:hover {
            color: var(--primary-green);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
